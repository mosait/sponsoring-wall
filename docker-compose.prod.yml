services:

  db:
    container_name: sponsoring-wall-db
    image: supabase/postgres:15.1.1.78
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    volumes:
      - ./supabase/init-db.sql:/docker-entrypoint-initdb.d/z99-init-db.sql
      - db_data:/var/lib/postgresql/data
    command: postgres -c listen_addresses='*' -c wal_level=logical
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  realtime-setup:
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      realtime:
        condition: service_started
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./scripts/init-realtime.sh:/init-realtime.sh
    entrypoint:
      - /bin/sh
      - -c
      - |
        until PGPASSWORD=$$POSTGRES_PASSWORD psql -h db -U postgres -d postgres -c "SELECT 1 FROM public.tenants;" > /dev/null 2>&1; do
          sleep 2
        done
        /init-realtime.sh
    networks:
      - internal

  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v12.2.0
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_OPENAPI_MODE: disabled
    networks:
      - internal

  auth:
    container_name: supabase-auth
    image: supabase/gotrue:v2.143.0
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SCHEME:-http}://${SERVER_HOST}:8000/auth/v1
      GOTRUE_SITE_URL: ${SCHEME:-http}://${SERVER_HOST}
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres?sslmode=disable
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@alrahma-darmstadt.de
    networks:
      - internal

  realtime:
    container_name: supabase-realtime
    image: ghcr.io/supabase/realtime:v2.78.11
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "4000"
      HOSTNAME: localhost
      APP_NAME: realtime
      DB_HOST: db
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PORT: "5432"
      DB_SSL: "false"
      REPLICATION_MODE: PUBLICATION
      REPLICATION_SLOT: realtime_slot
      JWT_SECRET: ${JWT_SECRET}
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DB_ENC_KEY: ${ENC_KEY}
      SECURE_CHANNELS: "false"
      ERL_NODE_NAME: realtime@127.0.0.1
    networks:
      - internal

  kong:
    container_name: supabase-kong
    image: kong:2.8.1-alpine
    restart: always
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_LOG_LEVEL: warn
    volumes:
      - ./supabase/kong.yml:/etc/kong/kong.yml
    depends_on:
      - rest
      - realtime
      - auth
    networks:
      - internal
      - web

  frontend:
    container_name: sponsoring-wall-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${SCHEME:-http}://${SERVER_HOST}:8000
        - VITE_SUPABASE_ANON_KEY=${ANON_KEY}
    environment:
      # Laufzeit-Vars — nie im Image-Layer, nur im laufenden Container
      - ADMIN_HTTP_USER=${ADMIN_HTTP_USER:-admin}
      - ADMIN_HTTP_PASSWORD=${ADMIN_HTTP_PASSWORD:-}
      - ADMIN_ALLOWED_IPS=${ADMIN_ALLOWED_IPS:-}
    ports:
      - "80:80"
    restart: always
    depends_on:
      - kong
    networks:
      - web

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  db_data:
