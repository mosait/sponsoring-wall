# Rate-Limiting für /admin: max 5 Requests/Minute pro IP
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Admin-Route: Rate-Limiting + optionale Basic Auth + optionale IP-Beschränkung
    location /admin {
        limit_req zone=admin_limit burst=3 nodelay;
        limit_req_status 429;

        # HTTP Basic Auth — nur aktiv wenn ADMIN_HTTP_PASSWORD gesetzt (sinnvoll mit HTTPS)
        ADMIN_BASIC_AUTH_CONFIG

        # IP-Allowlist — wird beim Container-Start durch ADMIN_ALLOWED_IPS ersetzt
        ADMIN_IP_RULES

        try_files $uri $uri/ /index.html;
    }

    # SPA routing — alles geht zu index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache für Assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
